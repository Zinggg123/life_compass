use_gpu: False #服务器上是True
# gpu_id: 0
seed: 2024
# num_workers: 4
# prefetch_factor: 4
# pin_memory: True

# ======== 数据集 ========
dataset: yelp2018
data_path: F:\bishe\rec_system\dataset  #更改为本机路径
checkpoint_dir: F:\bishe\rec_system\artifact

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
# RATING_FIELD: rating
load_col:
  inter: [user_id, item_id]
  # inter: [user_id, item_id, rating]
  
# val_interval:
#     rating: "[3,inf)"    
# unused_col: 
#     inter: [rating]
    
user_inter_num_interval: "[10,inf)"
item_inter_num_interval: "[10,inf)"

# 确保双向一致性（只保留既在用户列表中又在物品列表中且满足上述条件的交互）
filter_inter_by_user_or_item: True

# ======== 模型配置 ========
model: LightGCN
embedding_size: 64
n_layers: 3
reg_weight: 0.0001

# ======== 训练配置 ========
epochs: 300
train_batch_size: 8192
learner: adam # 优化器
learning_rate: 0.001

train_neg_sample_args:
  distribution: uniform
  sample_num: 1
  dynamic: True
  candidate_num: 10   # 推荐从 5 到 20 之间选择

eval_step: 10
stopping_step: 50

# ======== 评估 ========
eval_batch_size: 40960
eval_args:
  group_by: user
  order: RO
  split: {'RS': [0.8, 0.1, 0.1]}
  mode:
    valid: 'full'
    test: 'full'
repeatable: False
metrics: ['Recall', 'NDCG', 'Precision', 'MAP']
topk: [10, 20]
valid_metric: NDCG@10


# ======== 日志与保存 ========
show_progress: True
verbose: 1
save_dataset: False